<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>文化祭限定！Memory Touch 10</title>
    <style>
        body {
            font-family: 'Helvetica Neue', Arial, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            background-color: #f0f2f5;
            overflow: hidden;
        }
        h1 {
            margin-bottom: 10px;
            color: #333;
            font-size: 28px;
        }
        .instruction {
            font-size: 16px;
            color: #666;
            margin-bottom: 20px;
            font-weight: bold;
        }
        .grid-container {
            position: relative;
        }
        .grid {
            display: grid;
            grid-template-columns: repeat(5, 75px);
            grid-template-rows: repeat(5, 75px);
            gap: 10px;
        }
        .cell {
            background-color: #fff;
            border: 3px solid #ccc;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 28px;
            font-weight: bold;
            color: #333;
            cursor: pointer;
            user-select: none;
            transition: all 0.1s ease;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
        }
        .cell:active {
            transform: scale(0.95);
        }
        /* ？マークのときのちょっとミステリアスな色 */
        .cell.masked {
            background-color: #e0e0e0;
            color: #7f8c8d;
        }
        /* 正解の緑色（開く） */
        .cell.correct {
            background-color: #2ecc71 !important;
            color: white !important;
            border-color: #27ae60 !important;
        }
        /* 間違いの赤色（開く） */
        .cell.wrong {
            background-color: #e74c3c !important;
            color: white !important;
            border-color: #c0392b !important;
        }
        /* 画面いっぱいに表示する巨大な○×用レイヤー */
        .result-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            background-color: rgba(240, 242, 245, 0.85);
            pointer-events: none;
            opacity: 0;
            transform: scale(0.5);
            transition: all 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            z-index: 10;
            border-radius: 15px;
        }
        .result-overlay.show {
            opacity: 1;
            transform: scale(1);
            pointer-events: auto;
        }
        .huge-symbol {
            font-size: 200px;
            font-weight: bold;
            line-height: 1;
        }
        .huge-symbol.circle { color: #2ecc71; }
        .huge-symbol.cross { color: #e74c3c; }

        .btn-container {
            margin-top: 25px;
        }
        button {
            padding: 12px 30px;
            font-size: 18px;
            font-weight: bold;
            background-color: #3498db;
            color: white;
            border: none;
            border-radius: 25px;
            cursor: pointer;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            transition: background 0.2s;
        }
        button:hover { background-color: #2980b9; }
    </style>
</head>
<body>

    <h1>Memory Touch 10</h1>
    <div class="instruction" id="statusText">場所を覚えろ！(2秒間)</div>
    
    <div class="grid-container">
        <div class="grid" id="grid"></div>
        
        <div class="result-overlay" id="overlay">
            <div class="huge-symbol" id="hugeSymbol"></div>
        </div>
    </div>

    <div class="btn-container">
        <button onclick="initGame()">スタート / リセット</button>
    </div>

    <script>
        const grid = document.getElementById('grid');
        const overlay = document.getElementById('overlay');
        const hugeSymbol = document.getElementById('hugeSymbol');
        const statusText = document.getElementById('statusText');
        
        let currentNumber = 1;
        let isGameOver = false;
        let canClick = false; // 覚える時間（2秒）はクリックできないようにするフラグ

        function initGame() {
            currentNumber = 1;
            isGameOver = false;
            canClick = false; 
            statusText.textContent = "場所を覚えろ！(2秒間)";
            statusText.style.color = "#e67e22"; // オレンジ色で警告っぽく
            
            overlay.classList.remove('show');
            hugeSymbol.className = 'huge-symbol';
            hugeSymbol.textContent = '';
            grid.innerHTML = ''; 

            // 位置シャッフル
            const positions = Array.from({length: 25}, (_, i) => i);
            for (let i = positions.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [positions[i], positions[j]] = [positions[j], positions[i]];
            }

            const gridData = Array(25).fill(null);
            for (let i = 0; i < 10; i++) {
                gridData[positions[i]] = i + 1;
            }

            // マス目の生成
            gridData.forEach((num) => {
                const cell = document.createElement('div');
                cell.classList.add('cell');
                cell.textContent = num ? num : ''; 
                
                // 正解判定用に、本来の数字を隠しデータとして持たせる
                cell.dataset.realNum = num ? num : '';

                cell.addEventListener('click', () => {
                    // ゲーム終了後、または2秒の記憶時間中はクリックを無視
                    if (isGameOver || !canClick) return; 

                    // すでに正解して開いているマスは連続クリック防止
                    if (cell.classList.contains('correct')) return;

                    const realNum = cell.dataset.realNum ? parseInt(cell.dataset.realNum) : null;

                    if (realNum === currentNumber) {
                        // 【正解】
                        cell.classList.remove('masked');
                        cell.classList.add('correct');
                        cell.textContent = realNum; // 数字を開く
                        currentNumber++;
                        
                        if (currentNumber > 10) {
                            isGameOver = true;
                            statusText.textContent = "クリア！お見事！";
                            statusText.style.color = "#2ecc71";
                            showResult('circle', '○');
                        }
                    } else {
                        // 【不正解】
                        cell.classList.remove('masked');
                        cell.classList.add('wrong');
                        cell.textContent = realNum ? realNum : ''; // 違った場所の数字（または空欄）を開く
                        isGameOver = true;
                        statusText.textContent = `ゲームオーバー！次は ${currentNumber} だったよ`;
                        statusText.style.color = "#e74c3c";
                        showResult('cross', '×');
                    }
                });

                grid.appendChild(cell);
            });

            // 💡 【ここがポイント】2.0秒（2000ミリ秒）後に数字を「？」で隠す
            setTimeout(() => {
                if (isGameOver) return; // 途中でリセットされたら何もしない
                
                const cells = grid.querySelectorAll('.cell');
                cells.forEach(cell => {
                    if (cell.dataset.realNum) {
                        cell.textContent = '？'; // 数字があった場所を「？」にする
                        cell.classList.add('masked');
                    }
                });
                
                canClick = true; // プレイヤーが叩けるようにする
                statusText.textContent = "1から順番に隠れた数字を叩け！";
                statusText.style.color = "#666";
            }, 2000);
        }

        // 巨大判定マーク
        function showResult(type, text) {
            hugeSymbol.classList.add(type);
            hugeSymbol.textContent = text;
            overlay.classList.add('show');
        }

        // ページを読み込んだら自動で1回目をスタート
        initGame();
    </script>
</body>
</html>
